<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MSBA Chatbot Prototype</title>

    <style>
      :root {
        --calpoly-green: #154734;
        --blue: #2563eb;
        --text: #111827;
        --muted: #6b7280;
        --border: #e5e7eb;
        --bg: #f8fafc;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: var(--calpoly-green);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 18px;
      }

      .chat-container {
        width: min(900px, 100%);
        background: white;
        padding: 18px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
      }

      .header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding-bottom: 12px;
        border-bottom: 1px solid var(--border);
        margin-bottom: 12px;
      }

      .header-left {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .logo {
        height: 40px;
        width: auto;
      }

      h2 {
        margin: 0;
        font-size: 18px;
        color: var(--text);
      }

      #chat {
        height: 420px;
        overflow-y: auto;
        border: 1px solid var(--border);
        padding: 12px;
        background: var(--bg);
        border-radius: 10px;
      }

      .msg {
        margin: 10px 0;
        line-height: 1.35;
      }

      .msg .sender {
        font-weight: 700;
        margin-right: 6px;
      }

      .msg.user .sender { color: var(--blue); }
      .msg.bot  .sender { color: var(--text); }

      .msg .bubble {
        display: inline;
        color: var(--text);
        white-space: pre-wrap;
        word-break: break-word;
      }

      a {
        color: var(--calpoly-green);
        text-decoration: underline;
        word-break: break-word;
      }

      a:hover {
        color: #1b5e20;
      }

      .composer {
        display: flex;
        gap: 10px;
        margin-top: 12px;
      }

      textarea {
        flex: 1;
        height: 64px;
        padding: 10px;
        border: 1px solid var(--border);
        border-radius: 10px;
        resize: none;
        font-family: inherit;
        font-size: 14px;
      }

      button {
        background: var(--blue);
        color: white;
        border: none;
        padding: 12px 16px;
        border-radius: 10px;
        cursor: pointer;
        font-weight: 700;
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .hint {
        margin-top: 8px;
        font-size: 12px;
        color: var(--muted);
      }
    </style>
  </head>

  <body>
    <div class="chat-container">
      <div class="header">
        <div class="header-left">
          <img
            src="calpoly-logo.png"
            alt="Cal Poly Logo"
            class="logo"
            onerror="this.style.display='none';"
          />
          <h2>MSBA Chatbot Prototype</h2>
        </div>
      </div>

      <div id="chat"></div>

      <div class="composer">
        <textarea id="input" placeholder="Ask a question..."></textarea>
        <button id="send" type="button">Send</button>
      </div>

      <div class="hint">
        Tip: Press <b>Enter</b> to send • <b>Shift+Enter</b> for a new line
      </div>
    </div>

    <script>
      var apiUrl = "https://5j5745a7m7wqhcgdlkvjxpcde40myaai.lambda-url.us-east-1.on.aws";

      // Stores the session ID that Bedrock returns after the first message.
      // Empty on page load — Bedrock creates the session on the first call.
      var bedrockSessionId = "";

      var chatBox = document.getElementById("chat");
      var input   = document.getElementById("input");
      var sendBtn = document.getElementById("send");

      function escapeHtml(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function linkify(text) {
        return String(text).replace(
          /(https?:\/\/[^\s<]+)/g,
          '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>'
        );
      }

      function appendMessage(sender, text, cls, opts) {
        opts = opts || {};
        var div = document.createElement("div");
        div.className = "msg " + cls;
        var safeSender = escapeHtml(sender);
        if (opts.html) {
          div.innerHTML = '<span class="sender">' + safeSender + ':</span> <span class="bubble">' + text + '</span>';
        } else {
          div.innerHTML = '<span class="sender">' + safeSender + ':</span> <span class="bubble">' + escapeHtml(text) + '</span>';
        }
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
        return div;
      }

      function updateLastBotMessage(div, text, opts) {
        opts = opts || {};
        if (!div) return;
        var bubble = div.querySelector(".bubble");
        if (!bubble) return;
        bubble.innerHTML = opts.html ? text : escapeHtml(text);
        chatBox.scrollTop = chatBox.scrollHeight;
      }

      function sendMessage() {
        var message = input.value.trim();
        if (!message) return;

        appendMessage("You", message, "user");
        input.value = "";
        input.focus();

        var botDiv = appendMessage("PolyBot", "Thinking…", "bot");
        sendBtn.disabled = true;

        var payload = { message: message };

        // Only include bedrockSessionId if Bedrock has given us one
        if (bedrockSessionId) {
          payload.bedrockSessionId = bedrockSessionId;
        }

        fetch(apiUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        })
        .then(function(res) {
          return res.text().then(function(rawText) {
            var data = {};
            try { data = JSON.parse(rawText); } catch(e) {}

            if (!res.ok) {
              var errMsg = (data && (data.detail || data.error)) || rawText || ("HTTP " + res.status);
              updateLastBotMessage(botDiv, "Server error: " + escapeHtml(errMsg));
              return;
            }

            // Store Bedrock's session ID for all subsequent messages
            if (data.bedrockSessionId) {
              bedrockSessionId = data.bedrockSessionId;
            }

            var answerText = (data && (data.answer || data.response)) || "No response";
            var answerHtml = linkify(escapeHtml(answerText)).replace(/\n/g, "<br/>");
            updateLastBotMessage(botDiv, answerHtml, { html: true });
          });
        })
        .catch(function(e) {
          updateLastBotMessage(botDiv, "Error contacting server.");
          console.error(e);
        })
        .finally(function() {
          sendBtn.disabled = false;
        });
      }

      window.addEventListener("load", function() {
        appendMessage(
          "PolyBot",
          "Hi! I'm your assistant for MSBA-related questions. How can I help you today?",
          "bot"
        );
      });

      sendBtn.addEventListener("click", sendMessage);

      input.addEventListener("keydown", function(e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });
    </script>
  </body>
</html>
